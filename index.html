<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake RPG</title>

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/ui.css">
    <link rel="stylesheet" href="css/animations.css">
</head>

<body>
    <div id="startScreen" class="modal">
        <div class="modal-content">
             <h2>Snake RPG</h2>
             <p>Press START or SPACE to begin</p>

             <button id="startBtn">START GAME</button>
        </div>
    </div>
    <div id="gameContainer">

        <!-- HUD -->
        <div id="hud">

            <div class="panel">
                <h3>Player</h3>

                <div class="stat-row">
                    <span>Level</span>
                    <span id="playerLevel">1</span>
                </div>

                <div class="stat-row">
                    <span>XP</span>
                    <span id="xpText">0 / 100</span>
                </div>

                <div class="xp-bar">
                    <div id="xpFill"></div>
                </div>
            </div>

            <div class="panel">
                <h3>Stats</h3>

                <div class="stat-row">
                    <span>Score</span>
                    <span id="score">0</span>
                </div>

                <div class="stat-row">
                    <span>HP</span>
                    <span id="hp">5</span>
                </div>

                <div class="stat-row">
                    <span>Combo</span>
                    <span id="combo">x1</span>
                </div>
            </div>

            <div class="panel">
                <h3>Progress</h3>

                <div class="stat-row">
                    <span>Stat Points</span>
                    <span id="statPoints">0</span>
                </div>

                <div class="stat-row">
                    <span>Achievements</span>
                    <span id="achievementCount">0</span>
                </div>
            </div>

        </div>

        <!-- Canvas -->
        <canvas id="gameCanvas" width="800" height="800"></canvas>

        <!-- Bottom Controls -->
        <div id="controls">

            <button id="pauseBtn">
                Pause
            </button>

            <button id="upgradesBtn">
                Upgrades
            </button>

            <button id="achievementsBtn">
                Achievements
            </button>

        </div>

    </div>

    <!-- Pause Menu -->
    <div id="pauseMenu" class="modal hidden">

        <div class="modal-content">

            <h2>Game Paused</h2>

            <button id="resumeBtn">
                Resume
            </button>

            <button id="saveBtn">
                Save Game
            </button>

            <button id="resetBtn">
                Reset Progress
            </button>

        </div>

    </div>

    <!-- Upgrade Menu -->
    <div id="upgradeMenu" class="modal hidden">

        <div class="modal-content">

            <h2>Upgrades</h2>

            <div id="upgradePointsBox">
                Available Points:
                <span id="upgradePoints">
                    0
                </span>
            </div>

            <div class="upgrade-grid">

                <button class="upgrade-btn" data-upgrade="speed">
                    Speed
                    <span id="speedLevel">0</span>
                </button>

                <button class="upgrade-btn" data-upgrade="hp">
                    Max HP
                    <span id="hpLevel">0</span>
                </button>

                <button class="upgrade-btn" data-upgrade="food">
                    Food Value
                    <span id="foodLevel">0</span>
                </button>

                <button class="upgrade-btn" data-upgrade="xp">
                    XP Gain
                    <span id="xpLevel">0</span>
                </button>

            </div>

            <button class="close-btn">
                Close
            </button>

        </div>

    </div>

    <!-- Achievements Menu -->
    <div id="achievementMenu" class="modal hidden">

        <div class="modal-content large">

            <h2>Achievements</h2>

            <div id="achievementList">
            </div>

            <button class="close-btn">
                Close
            </button>

        </div>

    </div>

    <!-- Achievement Popup -->
    <div id="achievementPopup">
        Achievement Unlocked!
    </div>

    <!-- Level Up Popup -->
    <div id="levelUpPopup">
        LEVEL UP!
    </div>

    <!-- Mobile Controls -->
    <div id="mobileControls">

        <button id="up">▲</button>

        <div class="middle-row">
            <button id="left">◄</button>
            <button id="down">▼</button>
            <button id="right">►</button>
        </div>

    </div>

    <script src="js/save.js"></script>
    <script src="js/player.js"></script>
    <script src="js/achievements.js"></script>
    <script src="js/upgrades.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/snake.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/game.js"></script>

</body>
</html>
